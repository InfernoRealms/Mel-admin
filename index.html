<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mimi | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .glass { background: #111; border: 1px solid #27272a; border-radius: 20px; padding: 25px; }
        .tab { padding: 12px 20px; font-weight: 800; font-size: 11px; text-transform: uppercase; color: #52525b; cursor: pointer; }
        .tab.active { color: #ec4899; border-bottom: 2px solid #ec4899; }
        input { background: #000 !important; border: 1px solid #333 !important; color: white; padding: 10px; border-radius: 10px; width: 100%; margin-top: 5px; outline: none; }
        .btn { background: #ec4899; color: white; font-weight: 900; padding: 12px; border-radius: 10px; width: 100%; margin-top: 15px; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; border: 1px solid #333; }
        .file-link { color: #38bdf8; text-decoration: underline; font-weight: bold; font-size: 11px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loading-overlay" class="fixed inset-0 bg-black z-50 flex items-center justify-center font-bold">LOADING...</div>

    <div id="admin-content" class="hidden p-8 max-w-6xl mx-auto">
        <div class="flex gap-6 mb-8 border-b border-zinc-800">
            <div onclick="showTab('store')" id="t-store" class="tab active">Store</div>
            <div onclick="showTab('chat')" id="t-chat" class="tab">Chats</div>
            <div onclick="showTab('staff')" id="t-staff" class="tab">Access</div>
        </div>

        <div id="p-chat" class="hidden glass grid grid-cols-3 gap-6 h-[650px]">
            <div id="tList" class="border-r border-zinc-800 overflow-y-auto"></div>
            <div class="col-span-2 flex flex-col">
                <div id="cBox" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2"></div>
                <div class="p-2 border-t border-zinc-800">
                    <div id="admUploadStatus" class="text-[9px] text-zinc-500 hidden">Uploading...</div>
                    <div class="flex gap-2 items-center">
                        <button onclick="document.getElementById('admFile').click()" class="bg-zinc-800 p-3 rounded-xl">📎</button>
                        <input type="file" id="admFile" class="hidden" onchange="adminUpload(this)">
                        <input type="text" id="rInput" placeholder="Reply..." class="flex-1">
                        <button onclick="rSend()" class="btn mt-0 w-32 text-[10px]">Reply</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="p-store" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass"><label>Discord</label><input type="text" id="aDisc"><label>PayPal Name</label><input type="text" id="aPay"><button onclick="saveG()" class="btn">Save</button></div>
            <div class="glass"><input type="text" id="sName" placeholder="Name"><input type="text" id="sPrice" placeholder="Price"><button onclick="addS()" class="btn bg-zinc-800">Add</button><div id="sList" class="mt-4"></div><button onclick="saveS()" class="btn">Update Site</button></div>
        </div>
        <div id="p-staff" class="hidden glass max-w-md mx-auto"><input type="email" id="staffEmail" placeholder="email@gmail.com"><button onclick="addStaff()" class="btn">Add Staff</button><div id="staffList" class="mt-6"></div></div>
    </div>

    <div id="login-screen" class="hidden h-screen flex items-center justify-center">
        <div class="glass text-center w-80"><h1 class="text-xl font-black mb-6 text-pink-500">Admin</h1><button onclick="adminLogin()" class="btn">Login</button></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, push, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIw732tQkUIeaYXAUAg_80kSH63BytVtE",
            authDomain: "mimi-s-website-c91fa.firebaseapp.com",
            databaseURL: "https://mimi-s-website-c91fa-default-rtdb.firebaseio.com",
            projectId: "mimi-s-website-c91fa",
            storageBucket: "mimi-s-website-c91fa.firebasestorage.app",
            messagingSenderId: "761353241386",
            appId: "1:761353241386:web:b5596befd6eb3dae699453"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();
        const OWNER_EMAIL = "abeedwehbe@gmail.com";

        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            if (user) {
                const staffSnap = await get(ref(db, 'staffList'));
                const authorized = staffSnap.val() ? Object.values(staffSnap.val()).includes(user.email) : false;
                if (user.email === OWNER_EMAIL || authorized) {
                    document.getElementById('admin-content').classList.remove('hidden');
                    document.getElementById('login-screen').classList.add('hidden');
                    initAdmin();
                } else { alert("Unauthorized."); auth.signOut(); }
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden');
            }
        });

        window.adminLogin = () => setPersistence(auth, browserLocalPersistence).then(() => signInWithPopup(auth, provider));

        window.showTab = (p) => {
            ['store', 'chat', 'staff'].forEach(id => {
                document.getElementById('p-'+id).classList.toggle('hidden', id !== p);
                document.getElementById('t-'+id).classList.toggle('active', id === p);
            });
        };

        function initAdmin() {
            window.adminUpload = async (el) => {
                const file = el.files[0];
                if(!file || !window.curId) return;
                document.getElementById('admUploadStatus').classList.remove('hidden');
                const fileRef = sRef(storage, `chats/${window.curId}/${Date.now()}_${file.name}`);
                try {
                    const snap = await uploadBytes(fileRef, file);
                    const url = await getDownloadURL(snap.ref);
                    const isImg = file.type.startsWith('image/');
                    push(ref(db, 'chats/'+window.curId), { sender:'melly', text: url, fileName: file.name, type: isImg ? 'image' : 'file' });
                } catch(e) { console.error(e); }
                document.getElementById('admUploadStatus').classList.add('hidden');
            };

            onValue(ref(db, 'chats'), (s) => {
                tList.innerHTML = '';
                s.forEach(t => {
                    const div = document.createElement('div');
                    div.className = "flex mb-1";
                    div.innerHTML = `<button onclick="window.loadAdminChat('${t.key}')" class="flex-1 text-left p-2 bg-zinc-900 text-[9px] rounded border border-zinc-800 truncate">${t.key}</button>`;
                    tList.appendChild(div);
                });
            });

            window.loadAdminChat = (chatId) => {
                window.curId = chatId;
                onValue(ref(db, 'chats/'+chatId), (snap) => {
                    cBox.innerHTML = '';
                    snap.forEach(m => {
                        const d = m.val();
                        const st = d.sender === 'melly' ? 'bg-pink-600 self-end' : 'bg-zinc-800 self-start';
                        let content = d.text;
                        if(d.type === 'image') content = `<img src="${d.text}" class="chat-img">`;
                        if(d.type === 'file') content = `📄 <a href="${d.text}" target="_blank" class="file-link">${d.fileName}</a>`;
                        cBox.innerHTML += `<div class="p-2 px-3 rounded-xl text-[11px] max-w-[80%] ${st}">${content}</div>`;
                    });
                });
            };

            window.rSend = () => {
                if(!window.curId || !rInput.value) return;
                push(ref(db, 'chats/'+window.curId), { sender:'melly', text: rInput.value, type: 'text' });
                rInput.value = '';
            };
            document.getElementById('rInput').addEventListener("keypress", (e) => { if(e.key === "Enter") rSend(); });
            
            // Re-bind other buttons (saveG, addS, etc.) if needed from previous version
        }
    </script>
</body>
</html>
